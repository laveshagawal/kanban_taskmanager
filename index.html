<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoApp</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav>
            <div class="left">KANBAN</div>
            <div class="right"><button id="toggle-modal">Add New Task</button></div>
        </nav>
        <section class="board">
            <div id="todo" class="taskcol">
                <div class="heading">
                    <div class="left">TO DO</div>
                    <div class="right" id="count-todo">0</div>
                </div>
            </div>
            <div id="progress" class="taskcol">
                <div class="heading">
                    <div class="left">In Progress</div>
                    <div class="right" id="count-progress">0</div>
                </div>
            </div>
            <div id="done" class="taskcol">
                <div class="heading">
                    <div class="left">Done</div>
                    <div class="right" id="count-done">0</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div class="modal add-new-task" id="modal">
        <div class="bg" id="modal-bg"></div>
        <div class="center">
            <input type="text" id="task-title" placeholder="Task Title" />
            <textarea id="task-dis" placeholder="TASK DESCRIPTION"></textarea>
            <select id="task-col">
                <option value="todo">To Do</option>
                <option value="progress">In Progress</option>
                <option value="done">Done</option>
            </select>
            <button id="add-new-task" class="add-task-button">ADD TASK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
